<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AP SSC Results</title>

<style>

body{
font-family:Arial, sans-serif;
background:#f2f2f2;
margin:0;
}

.header{
display:flex;
align-items:center;
margin-top:20px;
margin-left:120px;
}

.header img{
width:140px;
margin-right:40px;
}

.title{
text-align:center;
flex:1;
}

.title h2{
color:#0b7a0b;
margin:5px 0;
font-size:22px;
}

.title p{
margin:3px 0;
font-weight:bold;
color:#0b7a0b;
font-size:18px;
}

.line{
width:70%;
margin:25px auto;
border-top:2px solid #ccc;
}

.memo{
width:300px;
margin:0 auto;
border:2px solid #c44;
background:#fff;
text-align:center;
padding:15px;
}

.memo h3{
background:#c8c9e8;
padding:8px;
margin-top:0;
}

.inputbox{
margin-top:15px;
}

.inputbox input{
padding:6px;
width:170px;
border:1px solid #999;
}

button{
margin-top:10px;
padding:5px 12px;
cursor:pointer;
}

</style>
</head>

<body>

<div class="header">

<img src="https://www.studyplaces.co.in/wp-content/uploads/2025/04/BSEAP-logo.png.webp">

<div class="title">
<h2>BOARD OF SECONDARY EDUCATION :: ANDHRA PRADESH</h2>
<p>S.S.C PUBLIC EXAMINATION , MARCH - 2026</p>
</div>

</div>

<div class="line"></div>

<div class="memo">

<h3>MARKS MEMO</h3>

<div class="inputbox">
<label><b>ROLL NUMBER</b></label><br><br>
<input id="htno">
</div>

<button onclick="showResult()">Submit</button>

</div>

<div class="line"></div>

<script>

function showResult(){

let ht=document.getElementById("htno").value;

if(ht==""){
alert("Enter Roll Number");
return;
}

window.location.href="result.html?roll="+ht;

}

</script>

</body>
</html>
