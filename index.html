<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AP SSC Results</title>

<style>

body{
font-family:Arial, sans-serif;
background:#f2f2f2;
margin:0;
padding:0;
}

/* header */
.header{
display:flex;
align-items:center;
justify-content:center;
flex-wrap:wrap;
gap:15px;
padding:15px;
text-align:center;
}

.header img{
width:80px;
height:auto;
}

.title h2{
color:#0b7a0b;
margin:5px 0;
font-size:18px;
}

.title p{
margin:3px 0;
font-weight:bold;
color:#0b7a0b;
font-size:15px;
}

.line{
width:90%;
margin:20px auto;
border-top:2px solid #ccc;
}

.memo{
width:90%;
max-width:320px;
margin:0 auto;
border:2px solid #c44;
background:#fff;
text-align:center;
padding:15px;
border-radius:6px;
}

.memo h3{
background:#c8c9e8;
padding:8px;
margin-top:0;
}

.inputbox{
margin-top:15px;
}

.inputbox input{
padding:8px;
width:90%;
border:1px solid #999;
border-radius:4px;
}

button{
margin-top:15px;
padding:8px 16px;
cursor:pointer;
border:none;
background:#0b7a0b;
color:white;
border-radius:4px;
}

button:hover{
background:#095e09;
}

</style>
</head>

<body>

<div class="header">

<img src="https://www.studyplaces.co.in/wp-content/uploads/2025/04/BSEAP-logo.png.webp">

<div class="title">
<h2>BOARD OF SECONDARY EDUCATION :: ANDHRA PRADESH</h2>
<p>S.S.C PUBLIC EXAMINATION , MARCH - 2026</p>
</div>

</div>

<div class="line"></div>

<div class="memo">

<h3>MARKS MEMO</h3>

<div class="inputbox">
<label><b>ROLL NUMBER</b></label><br><br>
<input id="htno">
</div>

<button onclick="showResult()">Submit</button>

</div>

<div class="line"></div>

<script>
function showResult(){
let ht=document.getElementById("htno").value;

if(ht==""){
alert("Enter Roll Number");
return;
}

window.location.href="result.html";
}
</script>

</body>
</html>
