
<!DOCTYPE html>
<html>
<head>
<title>SSC Result</title>

<style>

body{
font-family:Arial, sans-serif;
background:#f2f2f2;
margin:0;
}

.header{
display:flex;
align-items:center;
margin-top:20px;
margin-left:120px;
}

.header img{
width:140px;
margin-right:40px;
}

.title{
text-align:center;
flex:1;
}

.title h2{
color:#0b7a0b;
margin:5px 0;
font-size:22px;
}

.title p{
margin:3px 0;
font-weight:bold;
color:#0b7a0b;
font-size:18px;
}

.line{
width:70%;
margin:25px auto;
border-top:2px solid #ccc;
}

.resultbox{
width:340px;
margin:40px auto;
border:2px solid #c44;
background:white;
padding:20px;
text-align:center;
overflow:hidden;
}

.resultbox h3{
background:#c8c9e8;
padding:8px;
margin-top:0;
}

/* animated text */
.april{
font-size:36px;
font-weight:bold;
color:red;
margin-top:20px;
animation:zoom 1.2s infinite alternate;
}

@keyframes zoom{
0%{transform:scale(1);}
100%{transform:scale(1.2);}
}

/* animated image */
.prankimg{
width:180px;
margin-top:15px;
animation:float 3s ease-in-out infinite;
}

@keyframes float{
0%{transform:translateY(0);}
50%{transform:translateY(-15px);}
100%{transform:translateY(0);}
}

</style>

</head>

<body>

<div class="header">

<img src="https://www.studyplaces.co.in/wp-content/uploads/2025/04/BSEAP-logo.png.webp">

<div class="title">
<h2>BOARD OF SECONDARY EDUCATION :: ANDHRA PRADESH</h2>
<p>S.S.C PUBLIC EXAMINATION , MARCH - 2026</p>
</div>

</div>

<div class="line"></div>

<div class="resultbox">

<h3>RESULT</h3>

<div class="april">APRIL FOOL 🤡</div><br>
<div >Pass Avuthav Bro 
    No Tension
</div>



</div>

<div class="line"></div>

</body>
</html>
