<!DOCTYPE html>
<html>
<head>
<title>SSC Result</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
font-family:Arial, sans-serif;
background:#f2f2f2;
margin:0;
}

/* header */
.header{
display:flex;
align-items:center;
justify-content:center;
flex-wrap:wrap;
gap:15px;
padding:15px;
text-align:center;
}

.header img{
width:80px;
}

.title h2{
color:#0b7a0b;
margin:5px 0;
font-size:18px;
}

.title p{
margin:3px 0;
font-weight:bold;
color:#0b7a0b;
font-size:15px;
}

.line{
width:90%;
margin:20px auto;
border-top:2px solid #ccc;
}

.resultbox{
width:90%;
max-width:340px;
margin:30px auto;
border:2px solid #c44;
background:white;
padding:20px;
text-align:center;
border-radius:6px;
}

.resultbox h3{
background:#c8c9e8;
padding:8px;
margin-top:0;
}

/* animated APRIL FOOL */
.april{
font-size:30px;
font-weight:bold;
color:red;
margin-top:20px;
animation:zoom 1.3s infinite alternate;
}

@keyframes zoom{
0%{transform:scale(1);}
100%{transform:scale(1.15);}
}

.prankimg{
width:120px;
margin-top:15px;
animation:float 3s infinite ease-in-out;
}

@keyframes float{
0%{transform:translateY(0);}
50%{transform:translateY(-10px);}
100%{transform:translateY(0);}
}

</style>
</head>

<body>

<div class="header">

<img src="https://www.studyplaces.co.in/wp-content/uploads/2025/04/BSEAP-logo.png.webp">

<div class="title">
<h2>BOARD OF SECONDARY EDUCATION :: ANDHRA PRADESH</h2>
<p>S.S.C PUBLIC EXAMINATION , MARCH - 2026</p>
</div>

</div>

<div class="line"></div>

<div class="resultbox">

<h3>RESULT</h3>

<div class="april">APRIL FOOL 🤡</div><br>
<div > <h1>Pass Avuthav Bro
     No Tension</div></h1>



</div>

<div class="line"></div>

</body>
</html>
